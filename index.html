# <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Instagram FitBox </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 17px;
            color: #86868b;
            font-weight: 400;
        }

        .settings-section {
            background: #f5f5f7;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
        }

        .settings-title {
            font-size: 13px;
            font-weight: 600;
            color: #6e6e73;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            background: white;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .hint {
            font-size: 13px;
            color: #86868b;
            margin-top: 6px;
        }

        .button {
            width: 100%;
            padding: 16px 32px;
            font-size: 17px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            margin-top: 32px;
            padding: 24px;
            background: #f5f5f7;
            border-radius: 16px;
            display: none;
        }

        .result-section.show {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-title {
            font-size: 20px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .success-icon {
            color: #30d158;
        }

        .result-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .result-label {
            font-size: 13px;
            font-weight: 600;
            color: #6e6e73;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-value {
            font-size: 15px;
            color: #1d1d1f;
            line-height: 1.6;
        }

        .hashtags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .hashtag {
            background: #e5e5ea;
            color: #667eea;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 32px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f5f5f7;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 15px;
            color: #86868b;
        }

        .error {
            background: #ffe5e5;
            color: #d32f2f;
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
            font-size: 14px;
            display: none;
        }

        .error.show {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        .canva-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #d2d2d7;
        }

        .canva-button {
            background: linear-gradient(135deg, #00c4cc 0%, #7c2ae8 100%);
        }

        .canva-button:hover {
            box-shadow: 0 8px 20px rgba(0, 196, 204, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎨</div>
            <h1>Agent Instagram FitBox</h1>
            <p class="subtitle">Générez des posts Instagram professionnels en quelques secondes</p>
        </div>

        <div class="settings-section">
            <div class="settings-title">Configuration</div>
            
            <div class="input-group">
                <label for="apiKey">Clé API Anthropic</label>
                <input type="password" id="apiKey" placeholder="sk-ant-api03-...">
                <p class="hint">Votre clé reste privée et n'est jamais partagée</p>
            </div>
        </div>

        <div class="input-group">
            <label for="demande">Décrivez votre post Instagram</label>
            <textarea id="demande" placeholder="Ex: Crée un post motivant avec une citation inspirante pour encourager les sportifs, style moderne avec couleur bleue"></textarea>
        </div>

        <button class="button" id="generateBtn" onclick="generatePost()">
            🚀 Générer le Post Complet
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p class="loading-text">Génération en cours...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result-section" id="result">
            <div class="result-title">
                <span class="success-icon">✓</span>
                Brief Généré
            </div>

            <div class="result-content">
                <div class="result-label">Type de post</div>
                <div class="result-value" id="postType"></div>
            </div>

            <div class="result-content">
                <div class="result-label">Message Principal</div>
                <div class="result-value" id="message"></div>
            </div>

            <div class="result-content">
                <div class="result-label">Description Instagram</div>
                <div class="result-value" id="description"></div>
            </div>

            <div class="result-content">
                <div class="result-label">Hashtags</div>
                <div class="hashtags" id="hashtags"></div>
            </div>

            <div class="result-content">
                <div class="result-label">Style & Couleur</div>
                <div class="result-value" id="style"></div>
            </div>

            <div class="canva-section">
                <button class="button canva-button" onclick="createOnCanva()">
                    ✨ Créer le Design sur Canva
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentBrief = null;

        async function generatePost() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const demande = document.getElementById('demande').value.trim();

            // Validation
            if (!apiKey) {
                showError('Veuillez entrer votre clé API Anthropic');
                return;
            }

            if (!demande) {
                showError('Veuillez décrire votre post Instagram');
                return;
            }

            // UI Loading
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('loading').classList.add('show');
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').classList.remove('show');

            try {
                // Étape 1: Appel n8n pour générer le brief
                const response = await fetch('https://nezarnezar.app.n8n.cloud/webhook/generate-instagram-fitbox', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ demande })
                });

                if (!response.ok) {
                    throw new Error('Erreur lors de la génération du brief');
                }

                const brief = await response.json();
                currentBrief = brief;

                // Afficher les résultats
                displayResults(brief);

            } catch (error) {
                showError('Erreur: ' + error.message);
            } finally {
                document.getElementById('generateBtn').disabled = false;
                document.getElementById('loading').classList.remove('show');
            }
        }

        function displayResults(brief) {
            document.getElementById('postType').textContent = brief.post_type || 'Non spécifié';
            document.getElementById('message').textContent = brief.message_principal || 'Non spécifié';
            document.getElementById('description').textContent = brief.description_instagram || 'Non spécifié';
            document.getElementById('style').textContent = `Style: ${brief.style || 'Non spécifié'} • Couleur: ${brief.couleur_dominante || 'Non spécifié'}`;

            // Hashtags
            const hashtagsContainer = document.getElementById('hashtags');
            hashtagsContainer.innerHTML = '';
            if (brief.hashtags && brief.hashtags.length > 0) {
                brief.hashtags.forEach(tag => {
                    const span = document.createElement('span');
                    span.className = 'hashtag';
                    span.textContent = tag;
                    hashtagsContainer.appendChild(span);
                });
            }

            document.getElementById('result').classList.add('show');
        }

        async function createOnCanva() {
            const apiKey = document.getElementById('apiKey').value.trim();

            if (!currentBrief) {
                showError('Veuillez d\'abord générer un brief');
                return;
            }

            // UI Loading
            document.querySelector('.canva-button').disabled = true;
            document.querySelector('.canva-button').textContent = '⏳ Création en cours...';

            try {
                // Appel API Claude pour créer sur Canva
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 4000,
                        messages: [{
                            role: 'user',
                            content: `Crée un post Instagram sur Canva avec ce brief:\n\nType: ${currentBrief.post_type}\nMessage: ${currentBrief.message_principal}\nStyle: ${currentBrief.style}\nCouleur: ${currentBrief.couleur_dominante}\nÉléments: ${currentBrief.elements_visuels}\n\nUtilise l'outil Canva pour créer le design automatiquement et donne-moi le lien.`
                        }]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'Erreur lors de la création sur Canva');
                }

                const data = await response.json();
                
                // Extraire le lien Canva de la réponse
                const textContent = data.content.find(c => c.type === 'text')?.text || '';
                
                showError('✅ Design créé sur Canva! Vérifiez votre compte Canva.', 'success');

            } catch (error) {
                showError('Erreur Canva: ' + error.message);
            } finally {
                document.querySelector('.canva-button').disabled = false;
                document.querySelector('.canva-button').textContent = '✨ Créer le Design sur Canva';
            }
        }

        function showError(message, type = 'error') {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.background = type === 'success' ? '#e5ffe5' : '#ffe5e5';
            errorDiv.style.color = type === 'success' ? '#2f7d32' : '#d32f2f';
            errorDiv.classList.add('show');

            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
